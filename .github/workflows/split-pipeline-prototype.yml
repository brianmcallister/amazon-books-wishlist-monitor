name: Split Pipeline Prototype

# THROWAWAY EXPERIMENT -- not part of the real pipeline, does not touch
# agent-pipeline.yml or its branches. See docs/AGENT_HARNESS.md's
# "Splitting stages into separate invocations" section for what this is
# testing: Analyzer and Planner as two separate GitHub Actions jobs, each
# running its own top-level claude-code-action session directly (no
# Orchestrator, no Agent-tool dispatch), instead of both being subagent
# dispatches inside one long-running Orchestrator session. Stops after
# Planner on purpose -- this is about seeing the job-graph UX and the
# per-job resume-logic mechanics, not about shipping a feature this way.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to work (small/trivial issue recommended -- this is a prototype)'
        required: true
        type: string

run-name: "Split prototype: issue #${{ inputs.issue_number }}"

concurrency:
  group: split-prototype-${{ inputs.issue_number }}

env:
  SUPERPOWERS_MARKETPLACE: https://github.com/obra/superpowers-marketplace.git
  SUPERPOWERS_PLUGIN: superpowers@superpowers-marketplace

jobs:
  analyzer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve branch and resume state
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/resolve-pipeline-state.js "${{ inputs.issue_number }}"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: 'true'
          prompt: |
            You are running as a standalone job -- not a subagent dispatched
            by an Orchestrator session, just this job's own top-level Claude
            Code run. Follow `.claude/agents/analyzer.md` exactly; it's
            written to work whether you were dispatched by an Orchestrator
            or are running as your own session like this.

            ISSUE NUMBER: ${{ inputs.issue_number }}
            REPO: ${{ github.repository }}
            BRANCH: ${{ steps.resolve.outputs.branch }}
            THIS RUN IS A: ${{ steps.resolve.outputs.is_resume == 'true' && 'RESUME (branch already exists)' || 'FRESH START (create it from main)' }}

            Use BRANCH exactly as given -- it was already resolved
            deterministically before this job started, don't recompute it.
            If fresh start, create it from `main` and check it out. If
            resume, check it out as-is.

            Read `.claude/agents/analyzer.md` and do exactly what it says.
            Commit and push per its own instructions -- this is the only
            chance this job gets to persist anything; nothing survives
            after this job's runner is torn down otherwise.
          claude_args: |
            --model claude-haiku-4-5
            --permission-mode bypassPermissions
            --max-turns 40
            --disallowedTools "ScheduleWakeup,mcp__*"

  planner:
    needs: analyzer
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.analyzer.outputs.branch }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: ${{ env.SUPERPOWERS_MARKETPLACE }}
          plugins: ${{ env.SUPERPOWERS_PLUGIN }}
          show_full_output: 'true'
          prompt: |
            You are running as a standalone job -- not a subagent dispatched
            by an Orchestrator session, just this job's own top-level Claude
            Code run, picking up right after the Analyzer job (a separate
            job, separate session, already finished and pushed its commit).
            Follow `.claude/agents/planner.md` exactly; it's written to
            work whether you were dispatched by an Orchestrator or are
            running as your own session like this.

            ISSUE NUMBER: ${{ inputs.issue_number }}
            REPO: ${{ github.repository }}
            BRANCH: ${{ needs.analyzer.outputs.branch }} (already checked out)

            Read `.agents/analysis.md` first to see what the Analyzer job
            found (classification, scope confirmation) -- confirm it's
            actually there and makes sense before proceeding; if it's
            missing or contradictory, say so and stop rather than guessing.

            Read `.claude/agents/planner.md` and do exactly what it says.
            Commit and push per its own instructions.

            This prototype stops here on purpose -- do not attempt Plan
            Validator, Implementer, Tester, or Deployer. Once your plan is
            committed and pushed, report a short summary and end your turn.
          claude_args: |
            --model claude-sonnet-5
            --permission-mode bypassPermissions
            --max-turns 60
            --disallowedTools "ScheduleWakeup,mcp__*"

      - name: Summary
        run: |
          echo "Analyzer and Planner both ran as separate jobs -- see the graph view above."
          echo "Branch: ${{ needs.analyzer.outputs.branch }}"
          echo "Prototype stops here on purpose -- no Implementer/Tester/Deployer, no PR opened."
