name: Agent Pipeline

# Single trigger, single input: the Actions "Run workflow" button both starts a
# fresh pipeline run and resumes one that stopped early. See
# docs/AGENT_HARNESS.md -> "How this actually runs" for the full design this
# file implements -- that doc is the spec; this file should not duplicate its
# reasoning, only its mechanics.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to work (fresh start if its branch does not exist yet, resume otherwise)'
        required: true
        type: string

run-name: "Pipeline: issue #${{ inputs.issue_number }}"

concurrency:
  group: pipeline-${{ inputs.issue_number }}

env:
  SUPERPOWERS_MARKETPLACE: https://github.com/obra/superpowers-marketplace.git
  SUPERPOWERS_PLUGIN: superpowers@superpowers-marketplace

jobs:
  orchestrator:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    outputs:
      live_check_warranted: ${{ steps.extract.outputs.live_check_warranted }}
      branch: ${{ steps.extract.outputs.branch }}
      run_complete: ${{ steps.extract.outputs.run_complete }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: run-claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: ${{ env.SUPERPOWERS_MARKETPLACE }}
          plugins: ${{ env.SUPERPOWERS_PLUGIN }}
          show_full_output: 'true'
          prompt: |
            You are the Orchestrator for this repo's agent pipeline. Read
            CLAUDE.md and docs/AGENT_HARNESS.md in full before doing anything
            else -- they are the spec for this run, not background reading.

            ISSUE NUMBER: ${{ inputs.issue_number }}
            REPO: ${{ github.repository }}

            Include the issue number in every subagent dispatch prompt --
            each subagent's own instructions tell it to title its commits
            `{Stage name} (#${{ inputs.issue_number }}): <summary>.` (the
            Implementer additionally includes its task position, e.g.
            `Implementer (#${{ inputs.issue_number }}): (3/8) <summary>.`),
            so every commit this pipeline makes shows up on the issue's own
            page with the actor and sequence clear at a glance -- that only
            works if each subagent actually knows the number, so don't leave
            it implicit.

            Follow "How this actually runs" -> "Fresh start vs. resume" in
            docs/AGENT_HARNESS.md exactly: resolve the branch name from the
            issue number, determine whether this is a fresh start (branch
            doesn't exist -> create it from main) or a resume (branch exists
            -> read which `.agents/*.md` files are already committed and the
            issue's comment thread for guidance since your last checkpoint).

            Then run the pipeline stages in order -- Analyzer, Planner, Plan
            Validator (only if the Analyzer classified the task
            scraping-touching), Implementer (a fresh `Agent` tool dispatch of
            `.claude/agents/implementer.md` per task in the Planner's
            breakdown, not one dispatch for the whole plan), Tester -- then,
            **only if the Tester determines a live Amazon check is NOT
            warranted, continue in this same job/session** to Deployer, then
            the PR Risk Analyzer script. Dispatch Deployer via the `Agent`
            tool per "Pipeline stages" in the doc; once it reports the PR
            number it opened or updated, run
            `node scripts/pr-risk-check.js ${{ inputs.issue_number }}
            <pr-number>` via Bash -- this is a deterministic script, not a
            subagent dispatch, so there's nothing to invoke through the
            `Agent` tool for this stage. Follow "Failure handling" in the
            doc for what to do when a stage can't proceed cleanly.

            The only reason to stop *before* Deployer/the PR Risk Analyzer
            script is if the Tester determines a live check IS warranted --
            that's the one hard boundary in this pipeline, and it belongs to
            a second, approval-gated job, never to you. Everything else
            (pure-logic tasks, or scraping-touching tasks where fixtures
            already proved sufficient) has no such boundary and should run
            end-to-end to a real PR in one job, not stop partway and wait
            for a human to manually continue something that doesn't
            actually need human approval.

            Log your progress to this job's own output as you go, so someone
            watching the Actions log (not just reading a summary afterward)
            can follow what's happening and when: immediately before
            dispatching each stage subagent (each Implementer task counts as
            its own stage here), run a Bash command like `echo "[$(date -u
            +%H:%M:%S)] STAGE START: <stage name> -- <one-line reason/task>"`,
            and immediately after it returns, `echo "[$(date -u +%H:%M:%S)]
            STAGE END: <stage name> -- <one-line outcome>"`. Do this for
            every stage, not just the ones that run into trouble -- the
            point is a sequential, timestamped trace of the whole run, not
            just a post-hoc summary.

            CRITICAL, non-negotiable: run `git push` yourself (not a
            subagent's job -- yours, since you're the one who knows when
            each stage actually finished) immediately after every single
            stage's commit(s) land, including after each individual
            Implementer task dispatch and after Deployer's commit. (The PR
            Risk Analyzer script pushes its own commit itself -- it's not a
            subagent, so there's no separate push step for you to run after
            it, just confirm it succeeded.) Do this at every stage, not just
            at the end. This job runs on an ephemeral runner -- anything
            committed but not pushed before the job ends is permanently
            lost the moment the runner is torn down, no matter how
            completely you describe it in a checkpoint comment afterward.

            Before your turn ends for ANY reason -- normal completion after
            the PR Risk Analyzer script, stopping after Tester because a
            live check is warranted, a Failure Handling stop, anything --
            confirm with
            `git status` and `git log origin/<branch>..HEAD` (or equivalent)
            that there is nothing committed locally that isn't already on
            the remote branch. If there is, push it before you stop. A
            checkpoint comment describing work that isn't actually on the
            remote branch is worse than no comment at all.

            You do not have live network access to Amazon and must not add
            any. Do not perform a live Amazon check yourself under any
            circumstances -- that is the Tester's determination only
            (warranted or not, with reasoning), carried out afterward, if
            warranted, by a separate approval-gated job, never by you.

            Whenever the doc's "Failure handling" section says to stop, post
            a comment on issue #${{ inputs.issue_number }} explaining what
            happened and what's needed, then stop.

            **If the Tester determines a live check IS warranted**, stop
            right there -- do not attempt Deployer or the PR Risk Analyzer
            script yourself. Report your structured output and end; the
            second job picks up Deployer and then the PR Risk Analyzer
            script after the live check completes and is approved.

            **If the Tester determines a live check is NOT warranted**,
            continue in this same session to Deployer, then the PR Risk
            Analyzer script. That's this job's normal successful ending: a
            PR opened or updated (or Deployer's keep/discard choice, per
            the doc) with its risk determination posted as a PR comment,
            everything pushed, and a final comment/PR description in place.

            Report structured output at the end: the branch name you
            resolved/created, whether a live Amazon check is warranted per
            the Tester's determination, and `run_complete`. Set
            `run_complete: false` if for ANY reason you did not reach a
            genuine, intentional stopping point of your own choosing --
            including if you notice your own turn being cut off,
            interrupted, or forced to answer before a dispatched subagent
            (e.g. Tester) actually finished. In that case, `live_check_warranted`
            should just be your best guess and must not be treated as a
            confirmed determination by anything downstream -- say so in
            `summary` too, but `run_complete: false` is the machine-readable
            signal, not prose a human has to notice. Only set `run_complete:
            true` for a real stop: normal completion after Tester, or a
            deliberate Failure Handling stop where you chose to end your own
            turn after posting a comment.
          claude_args: |
            --model claude-sonnet-5
            --permission-mode bypassPermissions
            --max-turns 250
            --disallowedTools "ScheduleWakeup,mcp__*"
            --json-schema '{"type":"object","properties":{"branch":{"type":"string"},"live_check_warranted":{"type":"boolean"},"run_complete":{"type":"boolean"},"summary":{"type":"string"}},"required":["branch","live_check_warranted","run_complete","summary"]}'

      - name: Extract structured output
        id: extract
        env:
          STRUCTURED_OUTPUT: ${{ steps.run-claude.outputs.structured_output }}
        run: |
          echo "branch=$(echo "$STRUCTURED_OUTPUT" | jq -r '.branch')" >> "$GITHUB_OUTPUT"
          echo "live_check_warranted=$(echo "$STRUCTURED_OUTPUT" | jq -r '.live_check_warranted')" >> "$GITHUB_OUTPUT"
          echo "run_complete=$(echo "$STRUCTURED_OUTPUT" | jq -r '.run_complete')" >> "$GITHUB_OUTPUT"

  live-amazon-check:
    needs: orchestrator
    if: needs.orchestrator.outputs.run_complete == 'true' && needs.orchestrator.outputs.live_check_warranted == 'true'
    runs-on: ubuntu-latest
    environment: live-amazon-check
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.orchestrator.outputs.branch }}
          fetch-depth: 0

      - name: Trigger check-wishlist.yml and wait for it
        id: trigger-live-check
        uses: actions/github-script@v7
        env:
          PIPELINE_BRANCH: ${{ needs.orchestrator.outputs.branch }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = process.env.PIPELINE_BRANCH;
            const dispatchedAt = Date.now();

            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'check-wishlist.yml',
              ref: branch,
            });

            let run;
            for (let attempt = 0; attempt < 30 && !run; attempt++) {
              await new Promise((r) => setTimeout(r, 10000));
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner, repo,
                workflow_id: 'check-wishlist.yml',
                branch,
                event: 'workflow_dispatch',
                per_page: 5,
              });
              run = data.workflow_runs.find(
                (r) => new Date(r.created_at).getTime() >= dispatchedAt - 5000
              );
            }
            if (!run) {
              core.setFailed('Timed out waiting for the triggered check-wishlist.yml run to appear.');
              return;
            }

            while (run.status !== 'completed') {
              await new Promise((r) => setTimeout(r, 15000));
              ({ data: run } = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: run.id }));
            }

            core.setOutput('run_id', String(run.id));
            core.setOutput('conclusion', run.conclusion);

      - name: Download the live check's debug artifact
        uses: actions/download-artifact@v4
        with:
          name: wishlist-debug
          path: live-check-artifact
          run-id: ${{ steps.trigger-live-check.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit the new fixture
        run: |
          mkdir -p test/fixtures
          stamp=$(date -u +%Y%m%d-%H%M%S)
          cp live-check-artifact/wishlist-debug.html "test/fixtures/wishlist-live-check-${stamp}.html"
          mkdir -p .agents
          printf 'Live Amazon check for issue #%s: workflow run %s, conclusion %s.\n' \
            "${{ inputs.issue_number }}" \
            "${{ steps.trigger-live-check.outputs.run_id }}" \
            "${{ steps.trigger-live-check.outputs.conclusion }}" > .agents/live-check-result.md
          git config user.name "claude[bot]"
          git config user.email "41898282+claude[bot]@users.noreply.github.com"
          git add test/fixtures/ .agents/live-check-result.md
          git commit -m "Live Check (#${{ inputs.issue_number }}): Add fixture from approved live Amazon check."
          git push

      - id: run-claude-continue
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: ${{ env.SUPERPOWERS_MARKETPLACE }}
          plugins: ${{ env.SUPERPOWERS_PLUGIN }}
          show_full_output: 'true'
          prompt: |
            You are resuming this repo's agent pipeline for issue
            #${{ inputs.issue_number }}, on branch
            ${{ needs.orchestrator.outputs.branch }}, immediately after an
            approved, now-complete live Amazon check (see
            .agents/live-check-result.md and the new fixture just committed
            to test/fixtures/).

            Read CLAUDE.md and docs/AGENT_HARNESS.md, then read
            `.agents/*.md` and recent commit history on this branch to
            understand what the pipeline already did. The Tester stage is
            done. Continue with the remaining stages: Deployer first,
            dispatched via the `Agent` tool per "Pipeline stages" in the
            doc; once it reports the PR number it opened or updated, run
            `node scripts/pr-risk-check.js ${{ inputs.issue_number }}
            <pr-number>` via Bash -- that's a deterministic script, not a
            subagent, so there's no `Agent` tool dispatch for it. Follow
            "Failure handling" in the doc if either stage can't proceed
            cleanly -- post a comment on the issue (or the PR, if Deployer
            has opened one) explaining what happened, then stop.

            Include the issue number (${{ inputs.issue_number }}) in every
            subagent dispatch prompt, same as the earlier job -- each
            subagent's own instructions tell it to title its commits
            `{Stage name} (#${{ inputs.issue_number }}): <summary>.`

            Log your progress the same way every other stage in this
            pipeline does: immediately before and after dispatching each
            stage subagent, `echo "[$(date -u +%H:%M:%S)] STAGE START/END:
            <stage name> -- <one-line reason/outcome>"` via Bash, so the
            Actions log reads as a sequential, timestamped trace.

            CRITICAL, non-negotiable, same as every other stage in this
            pipeline: `git push` yourself immediately after Deployer's
            commit(s) -- don't wait until everything is done. (The PR Risk
            Analyzer script pushes its own commit itself once you run it;
            just confirm it succeeded.) This job runs on an ephemeral
            runner -- anything committed but not pushed before it ends is
            gone.

            You do not have live network access to Amazon and must not add
            any -- the one live check for this run already happened.
          claude_args: |
            --model claude-sonnet-5
            --permission-mode bypassPermissions
            --max-turns 250
            --disallowedTools "ScheduleWakeup,mcp__*"
